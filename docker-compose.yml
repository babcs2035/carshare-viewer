services:
  app:
    build: .
    container_name: carshare-viewer-app
    ports:
      - "127.0.0.1:${PORT:-3200}:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - MONGO_URI=mongodb://db:27017/
      - TZ=Asia/Tokyo
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mongo:8
    container_name: carshare-viewer-db
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
